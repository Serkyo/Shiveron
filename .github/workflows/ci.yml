name: CI

on:
    push:
        branches: ['dev']
    pull_request:
        branches: ['dev', 'main']

jobs:
    lint:
        name: Lint and format
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'
            - run: npm ci
            - name: Prettier
              run: npm run format:check
            - name: ESLint
              run: npm run lint
